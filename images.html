<script>
// Convert SVG to image and update product pages
function updateProductImages() {
  // Hero product
  const heroPhoto = document.querySelector('.hero-photo');
  if (heroPhoto) {
    const svg = document.getElementById('hero-product');
    const serialized = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([serialized], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    heroPhoto.style.backgroundImage = `url('${url}')`;
  }

  // Product photos in best sellers
  const productPhotos = [
    { selector: '.product-photo-1', svgId: 'product-1' },
    { selector: '.product-photo-2', svgId: 'product-2' },
    { selector: '.product-photo-3', svgId: 'product-3' },
    { selector: '.product-photo-4', svgId: 'product-4' }
  ];

  productPhotos.forEach(({ selector, svgId }) => {
    const elements = document.querySelectorAll(selector);
    elements.forEach(el => {
      const svg = document.getElementById(svgId);
      if (svg) {
        const serialized = new XMLSerializer().serializeToString(svg);
        const blob = new Blob([serialized], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        el.style.backgroundImage = `url('${url}')`;
      }
    });
  });

  // Gallery main in product page
  const galleryMain = document.querySelector('.gallery-main');
  if (galleryMain) {
    const svg = document.getElementById('product-1');
    if (svg) {
      const serialized = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([serialized], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      galleryMain.style.backgroundImage = `url('${url}')`;
    }
  }

  // Cart thumbs
  const cartThumbs = document.querySelectorAll('.cart-thumb');
  cartThumbs.forEach((thumb, idx) => {
    const svg = document.getElementById('product-1');
    if (svg) {
      const serialized = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([serialized], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      thumb.style.backgroundImage = `url('${url}')`;
    }
  });
}

// Run on page load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', updateProductImages);
} else {
  updateProductImages();
}
</script>
